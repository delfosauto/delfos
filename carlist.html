<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Delfos</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="stykeIdex.css">
    <link rel="stylesheet" href="styleMenu.css">
    <link rel="stylesheet" href="styleCarlist.css">
    <script src="scripts.js" defer></script>
</head>
<header>
    <div class="menu__default">
        <div class="menu__default--nav">
            <span class="material-symbols-outlined menu-icon">menu</span>
        </div>
        <div class="menu__default--logo">
            <img src="imagens/logo.png" alt="">
            <p style="font-size: 17px;">STAND CAR Importações</p>
        </div>
    </div>
    <div style="height: 51px; background-color: red;">teste</div>
</header>
<a id="BtmBack" href="" onclick="pageBack()">
    <span class="material-symbols-outlined menu-icon" style="font-size: 40px;">chevron_left</span>
</a>

<body>
    <section class="main__first--img">
        <div>
            <img class="IdCarImge" id="IdCarImg1" src="" alt="" title="">
            <img class="IdCarImge" id="IdCarImg2" src="" alt="" title="">
            <img class="IdCarImge" id="IdCarImg3" src="" alt="" title="">
            <img class="IdCarImge" id="IdCarImg4" src="" alt="" title="">
            <img class="IdCarImge" id="IdCarImg5" src="" alt="" title="">
        </div>
        <div class="slider-nav">
            <a href="#IdCarImg1"></a>
            <a href="#IdCarImg2"></a>
            <a href="#IdCarImg3"></a>
        </div>
    </section>
    <section>
        <div>
            <h1 style="margin-left: 20px;"><span id="namecar" ></span><span id="modcar"></span> <span id="verscar"></span></h1>
        </div>
        <div>
            <h2 style="margin-left: 20px;"><span>Origem:</span> <span id="countrycar"></span></h2>
        </div><br>
        <div>
            <h2 style="margin-left: 20px;"><span>Valor: </span> <span id="gold"></span><span> €</span></h2>
        </div>
    </section>
    <section class="main__input--inf" alt="informações">
        <h4 style="margin-left: 20px;">Dados do veículo</h4>
        <div >
            <div class="main__input--inf-data">
                <div><span class="material-symbols-outlined menu-icon">calendar_month</span></div>
                <div><label>Ano:</label></div>
                <div><span class="main__span--car" id="yearCar">2012</span></div>
            </div>
            <div class="main__input--inf-data">
                <div><span class="material-symbols-outlined menu-icon">pin_road_2</span></div>
                <div><label>quilometros</label></div>
                <div><span class="main__span--car" id="kmCar">195</span></div>
            </div>
            <div class="main__input--inf-data">
                <div><span class="material-symbols-outlined menu-icon">local_gas_station</span></div>
                <div><label>combustivel</label></div>
                <div><span class="main__span--car" id="fulcar">diesel</span></div>
            </div>
            <div class="main__input--inf-data">
                <div><span class="material-symbols-outlined menu-icon">speed_4</span></div>
                <div><label>Potência(CV)</label></div>
                <div><span class="main__span--car" id="cvCar">143</span></div>
            </div>
            <div class="main__input--inf-data">
                <div><span class="material-symbols-outlined menu-icon">Manufacturing</span></div>
                <div><label>cilindrada</label></div>
                <div><span  class="main__span--car" id="ccCar">1.995</span></div>
            </div>
            <div class="main__input--inf-data">
                <div><span class="material-symbols-outlined menu-icon">auto_transmission</span></div>
                <div><label>Tipo de caixa</label></div>
                <div><span   class="main__span--car" id="boxCar">manual</span></div>
            </div>
        </div>
    </section>
</body>

</html>
